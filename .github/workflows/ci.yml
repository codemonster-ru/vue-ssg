name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Workaround npm Optional Dependencies Bug
        run: npm i --include=optional

      - name: Ensure Rollup Linux Native Binary
        run: npm i --no-save @rollup/rollup-linux-x64-gnu

      - name: App Check
        run: npm run check

      - name: Package Release Check
        run: npm run release:check
